#version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: train-db
      POSTGRES_USER: adam
      POSTGRES_PASSWORD: root
    ports:
      - "5433:5432"
    volumes:
      - train_db_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - db
    env_file:
      - .env

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  train_db_data:

