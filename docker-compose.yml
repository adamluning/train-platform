#version: '3.8'

services:
  db:
    image: postgres:15
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adam -d train-db"]
      interval: 2s
      timeout: 2s
      retries: 10
    environment:
      POSTGRES_DB: train-db
      POSTGRES_USER: adam
      POSTGRES_PASSWORD: root
    ports:
      - "5433:5432"
    volumes:
      - train_db_data:/var/lib/postgresql/data

  migrate:
    image: migrate/migrate
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations
    command: [
      "-path", "/migrations",
      "-database", "postgres://adam:root@db:5432/train-db?sslmode=disable",
      "up"
    ]

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  train_db_data:

